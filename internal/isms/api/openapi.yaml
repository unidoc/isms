              schema:
                type: string
                format: binary
        '404':
          description: No logo configured

  # ── Git ─────────────────────────────────────────────────────────────────
  /git/{uuid}/info/refs:
    get:
      tags: [Git]
      summary: Git info/refs (smart HTTP)
      servers:
        - url: /
      parameters:
        - name: uuid
          in: path
          required: true
          schema: { type: string, format: uuid }
        - name: service
          in: query
          schema: { type: string, enum: [git-upload-pack, git-receive-pack] }
      responses:
        '200':
          description: Git refs advertisement

  /git/{uuid}/git-upload-pack:
    post:
      tags: [Git]
      summary: Git upload-pack (clone/fetch)
      servers:
        - url: /
      parameters:
        - name: uuid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Pack data

  /git/{uuid}/git-receive-pack:
    post:
      tags: [Git]
      summary: Git receive-pack (push)
      servers:
        - url: /
      parameters:
        - name: uuid
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        '200':
          description: Push result

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT session token from login
    apiKey:
      type: http
      scheme: bearer
      description: "Personal API key (isms_ prefix)"

  parameters:
    id:
      name: id
      in: path
      required: true
      schema: { type: integer }
    docId:
      name: docId
      in: path
      required: true
      schema: { type: string }
      description: "Document ID (e.g. ISO27001-4.1, ISO27001-POL-ISP, ISO27001-A.5.1)"

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/Error' }

  schemas:
    Error:
      type: object
      properties:
        message: { type: string }

    User:
      type: object
      properties:
        id: { type: integer }
        email: { type: string, format: email }
        name: { type: string }
        otp_verified: { type: boolean }
        email_verified: { type: boolean }
        pending_email: { type: string, format: email, nullable: true, description: "Address awaiting change confirmation, null if none (#128)" }
        active: { type: boolean }
        created_at: { type: string, format: date-time }
        last_seen: { type: string, format: date-time }

    UserWithRole:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          properties:
            role: { type: string, enum: [admin, manager, contributor, reader] }

    Organization:
      type: object
      properties:
        uuid: { type: string, format: uuid }
        name: { type: string }
        slug: { type: string }
        domain: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    APIKey:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        user_email: { type: string }
        permissions: { type: string, enum: [read, write, read-write] }
        last_used_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    Document:
      type: object
      properties:
        document_id: { type: string, example: "ISO27001-4.1" }
        title: { type: string }
        version: { type: string, example: "1.0" }
        status: { type: string, enum: [draft, in_review, approved, published] }
        author: { type: string }
        owner: { type: string }
        folder: { type: string }
        path: { type: string }
        content: { type: string, description: Markdown content (included on single-document endpoints) }

    SearchResult:
      type: object
      properties:
        document_id: { type: string }
        title: { type: string }
        folder: { type: string }
        snippet: { type: string, description: Matching text excerpt }
        score: { type: number }

    DocumentVersion:
      type: object
      properties:
        id: { type: integer }
        document_id: { type: string }
        version: { type: string }
        commit_hash: { type: string }
        file_path: { type: string }
        content_hash: { type: string }
        created_by: { type: string }
