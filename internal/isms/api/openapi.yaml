openapi: '3.1.0'
info:
  title: isms.sh API
  description: |
    AI-powered Information Security Management System.
    Git-native document management with ISO 27001, NIS2, and SOC 2 support.

    ## Authentication

    Three authentication methods (checked in order):

    1. **API tokens** - `Authorization: Bearer isms_xxx` - for CLI and AI agents
    2. **JWT session tokens** - `Authorization: Bearer <jwt>` - from login endpoint
    3. **Cloudflare Zero Trust** - JWT verification via `Cf-Access-Jwt-Assertion` header

    ## Multi-tenancy

    Organization context is resolved from subdomain, custom domain, or headers:
    - `X-Organization-UUID` header (preferred)
    - `X-Organization` header (slug)
    - `?org=` query parameter
  version: '1.0.0'
  contact:
    name: isms.sh
    url: https://isms.sh
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: /api/v1
    description: API v1

security:
  - bearerAuth: []
  - apiKey: []

tags:
  - name: Auth
    description: Login, logout, refresh, invite, password, OTP, passkeys, OIDC
  - name: Users
    description: Current user, user management, organizations
  - name: Config
    description: ISMS configuration from git repo
  - name: Documents
    description: List, search, get, edit, validate, needs-review, changed
  - name: Risks
    description: Risk register
  - name: Assets
    description: Information asset register
  - name: Suppliers
    description: Supplier register
  - name: Systems
    description: IT systems register with recovery objectives and access reviews
  - name: Legal
    description: Legal and regulatory requirements register
  - name: Incidents
    description: Security and operational incidents
  - name: Corrective Actions
    description: Nonconformities and corrective actions
  - name: Audit
    description: Audit programmes, audits, items, findings
  - name: Objectives
    description: Programs, objectives, check-ins, evidence
  - name: Reviews & Comments
    description: Document reviews, inline comments, approvals
  - name: Tasks
    description: Work items and task tracking
  - name: Changes
    description: Change management requests
  - name: Implementation
    description: Implementation status tracking
  - name: Notifications
    description: User notifications and inbox
  - name: References
    description: Cross-entity reference links
  - name: Changelog
    description: Entity-level audit trail
  - name: Activity
    description: Activity feed
  - name: Versions & Diff
    description: Document version history and diffs
  - name: Inbox
    description: Action items requiring attention
  - name: Admin
    description: Organization administration (admin role required)
  - name: Git
    description: Git smart HTTP protocol
  - name: Health
    description: Health check

paths:
  # ── Auth ────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      tags: [Auth]
      summary: Login with email and password
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email: { type: string, format: email }
                password: { type: string }
                otp_code: { type: string, description: TOTP code if OTP is enabled }
                org_slug: { type: string, description: Organization slug to log into }
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string, description: JWT session token }
                  user: { $ref: '#/components/schemas/User' }
                  organization: { $ref: '#/components/schemas/Organization' }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify-email:
    post:
      tags: [Auth]
      summary: Verify email with code
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, code]
              properties:
                email: { type: string, format: email }
                code: { type: string }
      responses:
        '200':
          description: Email verified
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/email:
    put:
      tags: [Auth]
      summary: Request an email change (verify-before-swap)
      description: >
        Re-authenticates the caller (current password and, if enabled, an
        authenticator code) and records the new address as pending. A
        confirmation link is mailed to the new address; the account's email is
        swapped only when that link is verified. The active email is unchanged
        until then.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_email]
              properties:
                new_email: { type: string, format: email }
                current_password: { type: string }
                otp: { type: string }
      responses:
        '200':
          description: Confirmation email sent to the new address
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: The target email is already in use
    delete:
      tags: [Auth]
      summary: Cancel a pending email change
      description: >
        Clears any pending email change and invalidates the outstanding
        confirmation token, so a stuck "pending" state can be recovered without
        DB access. No-op if nothing is pending.
      responses:
        '200':
          description: Pending change cancelled
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/verify-email-change:
    post:
      tags: [Auth]
      summary: Confirm an email change
      description: >
        Completes an email change using the token mailed to the new address.
        Unauthenticated — the token is the proof. Existing sessions carry the
        old email and must sign in again.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token]
              properties:
                token: { type: string }
      responses:
        '200':
          description: Email changed
          content:
            application/json:
              schema:
                type: object
                properties:
                  status: { type: string }
                  email: { type: string, format: email }
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: The address was claimed by another account before confirmation

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh JWT session token
      responses:
        '200':
          description: New token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Logout and revoke current token
      responses:
        '200':
          description: Logged out

  /auth/switch-org:
    post:
      tags: [Auth]
      summary: Switch to a different organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [org_slug]
              properties:
                org_slug: { type: string }
      responses:
        '200':
          description: New token for switched organization
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  organization: { $ref: '#/components/schemas/Organization' }
        '403':
          $ref: '#/components/responses/Forbidden'

  /auth/invite:
    post:
      tags: [Auth]
      summary: Invite a user to the organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                name: { type: string }
                role: { type: string, enum: [admin, manager, contributor, reader] }
      responses:
        '200':
          description: Invitation sent
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/password:
    put:
      tags: [Auth]
      summary: Change own password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [new_password]
              properties:
                current_password: { type: string }
                new_password: { type: string, minLength: 8 }
      responses:
        '200':
          description: Password changed
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/profile:
    put:
      tags: [Auth]
      summary: Update own profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name: { type: string }
      responses:
        '200':
          description: Profile updated

  /auth/otp/setup:
    post:
      tags: [Auth]
      summary: Start OTP setup (returns QR secret)
      responses:
        '200':
          description: OTP setup data
          content:
            application/json:
              schema:
                type: object
                properties:
                  secret: { type: string }
                  url: { type: string, description: otpauth:// URI for QR code }

  /auth/otp/verify:
    post:
      tags: [Auth]
      summary: Verify OTP code to complete setup
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code]
              properties:
                code: { type: string }
      responses:
        '200':
          description: OTP verified and enabled
        '400':
          $ref: '#/components/responses/BadRequest'

  /auth/otp:
    delete:
      tags: [Auth]
      summary: Disable OTP
      responses:
        '200':
          description: OTP disabled

  /auth/api-keys:
    get:
      tags: [Auth]
      summary: List own API keys
      responses:
        '200':
          description: List of personal API keys
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/APIKey' }
    post:
      tags: [Auth]
      summary: Create a personal API key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
                permissions: { type: string, enum: [read, write, read-write], default: read-write }
      responses:
        '201':
          description: API key created (token shown once)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id: { type: integer }
                  name: { type: string }
                  token: { type: string, description: "Full token (isms_...) - only shown once" }

  /auth/api-keys/{id}:
    delete:
      tags: [Auth]
      summary: Revoke own API key
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: API key revoked

  /auth/passkey/login/begin:
    post:
      tags: [Auth]
      summary: Begin passkey login ceremony
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
      responses:
        '200':
          description: WebAuthn credential request options

  /auth/passkey/login/complete:
    post:
      tags: [Auth]
      summary: Complete passkey login ceremony
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: WebAuthn assertion response
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  token: { type: string }
                  user: { $ref: '#/components/schemas/User' }

  /auth/passkey/register/begin:
    post:
      tags: [Auth]
      summary: Begin passkey registration ceremony
      responses:
        '200':
          description: WebAuthn credential creation options

  /auth/passkey/register/complete:
    post:
      tags: [Auth]
      summary: Complete passkey registration ceremony
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: WebAuthn attestation response
      responses:
        '200':
          description: Passkey registered

  /auth/passkeys:
    get:
      tags: [Auth]
      summary: List registered passkeys
      responses:
        '200':
          description: List of passkeys
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        created_at: { type: string, format: date-time }
                        last_used: { type: string, format: date-time }

  /auth/passkeys/{id}:
    put:
      tags: [Auth]
      summary: Rename a passkey
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name: { type: string }
      responses:
        '200':
          description: Passkey renamed
    delete:
      tags: [Auth]
      summary: Delete a passkey
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Passkey deleted

  /auth/oidc/providers:
    get:
      tags: [Auth]
      summary: List available OIDC providers
      security: []
      responses:
        '200':
          description: List of configured OIDC providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id: { type: integer }
                        name: { type: string }
                        slug: { type: string }

  /auth/oidc/authorize:
    get:
      tags: [Auth]
      summary: Begin OIDC authorization flow
      security: []
      parameters:
        - name: provider
          in: query
          required: true
          schema: { type: string }
      responses:
        '302':
          description: Redirect to OIDC provider

  /auth/oidc/callback:
    get:
      tags: [Auth]
      summary: OIDC authorization callback
      security: []
      parameters:
        - name: code
          in: query
          schema: { type: string }
        - name: state
          in: query
          schema: { type: string }
      responses:
        '302':
          description: Redirect to app with session token

  # ── Users ───────────────────────────────────────────────────────────────
  /me:
    get:
      tags: [Users]
      summary: Get current user profile
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema: { $ref: '#/components/schemas/User' }

  /me/organizations:
    get:
      tags: [Users]
      summary: List organizations the current user belongs to
      responses:
        '200':
          description: List of organizations
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Organization' }

  /users:
    get:
      tags: [Users]
      summary: List users in the organization
      responses:
        '200':
          description: List of users with roles
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/UserWithRole' }
    post:
      tags: [Users]
      summary: Create or update a user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email: { type: string, format: email }
                name: { type: string }
                role: { type: string, enum: [admin, manager, contributor, reader] }
      responses:
        '200':
          description: User created or updated

  /organizations:
    post:
      tags: [Users]
      summary: Create a new organization
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, slug]
              properties:
                name: { type: string }
                slug: { type: string, pattern: '^[a-z0-9-]+$' }
      responses:
        '201':
          description: Organization created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Organization' }

  # ── Config ──────────────────────────────────────────────────────────────
  /config:
    get:
      tags: [Config]
      summary: Get ISMS configuration
      description: Returns org configuration from PostgreSQL (branding, org name, platform settings).
      responses:
        '200':
          description: Configuration object
          content:
            application/json:
              schema:
                type: object
                description: Org branding and platform settings





  # ── Documents ───────────────────────────────────────────────────────────
  /documents/all:
    get:
      tags: [Documents]
      summary: List all documents
      description: Scans the git repo dynamically for all documents across all folders.
      responses:
        '200':
          description: List of all documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Document' }

  /documents/search:
    get:
      tags: [Documents]
      summary: Search documents
      parameters:
        - name: q
          in: query
          required: true
          schema: { type: string }
          description: Search query (matches title, content, document ID)
      responses:
        '200':
          description: Search results
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/SearchResult' }

  /documents/needs-review:
    get:
      tags: [Documents]
      summary: List documents needing review
      responses:
        '200':
          description: Documents with pending reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Document' }

  /documents/changed:
    get:
      tags: [Documents]
      summary: List recently changed documents
      responses:
        '200':
          description: Recently changed documents
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Document' }

  /documents/validate:
    get:
      tags: [Documents]
      summary: Validate all documents
      description: Checks documents for schema issues, missing fields, and referential integrity.
      responses:
        '200':
          description: Validation results
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid: { type: boolean }
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        document_id: { type: string }
                        message: { type: string }

  /documents/file/{folder}/{id}:
    get:
      tags: [Documents]
      summary: Get a document by folder and file ID
      parameters:
        - name: folder
          in: path
          required: true
          schema: { type: string }
          description: Document folder name
        - name: id
          in: path
          required: true
          schema: { type: string }
      responses:
        '200':
          description: Document with content
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Document' }
        '404':
          $ref: '#/components/responses/NotFound'

  /documents/{docId}/metadata:
    put:
      tags: [Documents]
      summary: Update document metadata (frontmatter)
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                title: { type: string }
                status: { type: string }
                owner: { type: string }
                version: { type: string }
      responses:
        '200':
          description: Metadata updated
        '404':
          $ref: '#/components/responses/NotFound'

  /documents/{docId}/content:
    put:
      tags: [Documents]
      summary: Update document content (markdown body)
      parameters:
        - $ref: '#/components/parameters/docId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [content]
              properties:
                content: { type: string, description: Markdown content }
                message: { type: string, description: Git commit message }
      responses:
        '200':
          description: Content updated
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Versions & Diff ────────────────────────────────────────────────────
  /documents/{docId}/versions:
    get:
      tags: [Versions & Diff]
      summary: List document versions
      parameters:
        - $ref: '#/components/parameters/docId'
      responses:
        '200':
          description: Version history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/DocumentVersion' }

  /documents/{docId}/diff:
    get:
      tags: [Versions & Diff]
      summary: Get diff between document versions
      parameters:
        - $ref: '#/components/parameters/docId'
        - name: from
          in: query
          schema: { type: string }
          description: From version or commit hash
        - name: to
          in: query
          schema: { type: string }
          description: To version or commit hash
      responses:
        '200':
          description: Unified diff
          content:
            application/json:
              schema:
                type: object
                properties:
                  diff: { type: string }

  # ── Assets ──────────────────────────────────────────────────────────────
  /assets:
    get:
      tags: [Assets]
      summary: List all assets
      responses:
        '200':
          description: List of assets
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/Asset' }
    post:
      tags: [Assets]
      summary: Create an asset
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Asset' }
      responses:
        '201':
          description: Asset created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Asset' }

  /assets/{id}:
    put:
      tags: [Assets]
      summary: Update an asset
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/Asset' }
      responses:
        '200':
          description: Asset updated
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Asset' }
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Assets]
      summary: Delete an asset
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Asset deleted
        '404':
          $ref: '#/components/responses/NotFound'

  # ── Systems ─────────────────────────────────────────────────────────────
  /systems:
    get:
      tags: [Systems]
      summary: List all systems
      responses:
        '200':
          description: List of systems
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/System' }
    post:
      tags: [Systems]
      summary: Create a system
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/System' }
      responses:
        '201':
          description: System created
          content:
            application/json:
              schema: { $ref: '#/components/schemas/System' }

  /systems/{id}:
    put:
      tags: [Systems]
      summary: Update a system
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/System' }
      responses:
        '200':
          description: System updated
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Systems]
      summary: Delete a system
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: System deleted

  /systems/{id}/access-reviews:
    get:
      tags: [Systems]
      summary: List access reviews for a system
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: List of access reviews
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items: { $ref: '#/components/schemas/AccessReview' }
    post:
      tags: [Systems]
      summary: Create an access review for a system
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/AccessReview' }
      responses:
        '201':
          description: Access review created

  /access-reviews/{id}:
    delete:
      tags: [Systems]
      summary: Delete an access review
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Access review deleted

  # ── Risks ───────────────────────────────────────────────────────────────
  /risks:
    get:
